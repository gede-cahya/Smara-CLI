<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smara AI - Desktop Agent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="src/style.css">
</head>
<body>
  <div id="app">
    <!-- Sidebar (ID: sidebar) -->
    <aside class="sidebar" id="sidebar">
      <div class="logo">
        <i class="fas fa-atom"></i>
        <span>Smara</span>
      </div>

      <div class="nav-section">
        <div class="nav-title">Workspaces</div>
        <div id="workspace-list">
          <!-- Dynamic Content -->
          <div class="nav-item active">Loading...</div>
        </div>
      </div>

      <div class="nav-section">
        <div class="nav-title" style="display: flex; justify-content: space-between; align-items: center;">
          Session History
          <i class="fas fa-plus-circle cursor-pointer" id="new-session-btn" title="Create New Session" style="color: var(--accent-color); font-size: 14px;"></i>
        </div>
        <div id="session-list">
          <!-- Dynamic Content -->
        </div>
      </div>

      <div class="nav-section">
        <div class="nav-title">Connected Tools</div>
        <div id="tools-list" class="tools-inspector">
          <!-- Dynamic Tools -->
        </div>
      </div>

      <div style="margin-top: auto;">
        <div class="nav-item" id="open-settings-btn">
          <i class="fas fa-cog" style="margin-right: 12px"></i>
          Settings
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <header class="header">
        <div style="display: flex; align-items: center; gap: 12px">
          <div>
            <div style="font-weight: 700; font-size: 13px; letter-spacing: 0.05em; color: var(--text-primary)" id="current-workspace-name">SMARA CLI</div>
            <div style="font-size: 10px; color: var(--text-secondary); text-transform: uppercase" id="current-session-mode">Ask Mode</div>
          </div>
        </div>
        
        <div style="display: flex; gap: 24px; align-items: center">
          <button class="theme-toggle" id="theme-toggle">
            <i class="fas fa-adjust"></i>
          </button>
          <div style="display: flex; align-items: center; gap: 8px; font-size: 10px; color: var(--text-secondary); text-transform: uppercase">
            <span id="model-indicator">AI Ready</span>
          </div>
        </div>
      </header>

      <div class="chat-container" id="chat-container">
        <!-- Messages will be injected here -->
        
        <!-- Thinking Placeholder -->
        <div class="message ai" style="display: none; align-items: center; gap: 8px; font-style: italic; opacity: 0.7" id="thinking-bubble">
          <div class="pulse-animation"></div>
          <span>Thinking...</span>
        </div>
      </div>

      <div class="input-area">
        <div class="input-wrapper">
          <input type="text" placeholder="Ketik perintah atau tanya apapun..." id="chat-input">
          <div style="position: absolute; right: 20px; display: flex; gap: 12px; color: var(--text-secondary)">
            <i class="fas fa-paperclip cursor-pointer"></i>
            <i class="fas fa-microphone cursor-pointer"></i>
          </div>
        </div>
        <button class="send-btn" id="send-btn">
          <i class="fas fa-paper-plane"></i>
        </button>
      </div>
    </main>

    <!-- Settings Modal (ID: settings-modal) -->
    <div id="settings-modal" class="modal-overlay">
      <div class="modal-content glass-panel ghost-border">
        <div class="modal-header">
          <h3><i class="fas fa-cog"></i> Smara Settings</h3>
          <i class="fas fa-times cursor-pointer" id="close-settings-btn"></i>
        </div>
        <div class="modal-body">
          <form id="settings-form">
            <div class="form-group">
              <label>Provider</label>
              <select id="setting-provider">
                <option value="ollama">Ollama</option>
                <option value="openai">OpenAI</option>
                <option value="openrouter">OpenRouter</option>
                <option value="anthropic">Anthropic</option>
                <option value="custom">Custom</option>
              </select>
            </div>
            <div class="form-group">
              <label>Model</label>
              <input type="text" id="setting-model" placeholder="minimax-m2.5:cloud">
            </div>
            <div class="form-group" id="apikey-group">
              <label>API Key</label>
              <input type="password" id="setting-apikey" placeholder="sk-...">
            </div>
            <div class="form-group">
              <label>Base URL (Optional)</label>
              <input type="text" id="setting-baseurl" placeholder="https://api.openai.com/v1">
            </div>
            <div class="modal-footer">
              <button type="button" class="btn-secondary" id="cancel-settings">Batal</button>
              <button type="submit" class="btn-primary">Simpan Perubahan</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- Minimalist thinking indicator styles -->
  <style>
    .message.ai.thinking {
      display: flex;
      align-items: center;
      gap: 12px;
      font-style: italic;
      opacity: 0.5;
      font-size: 12px;
    }

    .typing-dots {
      display: flex;
      gap: 4px;
    }

    .typing-dots span {
      width: 4px;
      height: 4px;
      background: var(--text-secondary);
      border-radius: 50%;
      animation: blink 1.4s infinite both;
    }

    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0% { opacity: 0.2; }
      20% { opacity: 1; }
      100% { opacity: 0.2; }
    }
    
    .nav-item.active {
      color: var(--text-primary);
      font-weight: 700;
    }
  </style>

  <script src="./src/main.ts" type="module"></script>
</body>
</html>
