<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smara AI</title>
  <style>
    body { margin: 0; padding: 0; background: #131313; color: #e2e2e2; font-family: Inter, sans-serif; }
    #root { width: 100%; height: 100vh; display: flex; align-items: center; justify-content: center; flex-direction: column; }
    .test-box { background: #2a2a2a; padding: 40px; border-radius: 12px; text-align: center; }
    .title { color: #818cf8; font-size: 32px; font-weight: bold; margin-bottom: 20px; }
    .subtitle { color: #94a3b8; font-size: 16px; }
    button { background: #818cf8; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-size: 16px; cursor: pointer; margin-top: 20px; }
    button:hover { background: #6366f1; }
  </style>
</head>
<body>
  <div id="root">
    <div class="test-box">
      <div class="title">Smara AI</div>
      <div class="subtitle">Desktop Agent - Loading...</div>
      <button onclick="testClick()">Test Button</button>
    </div>
  </div>
  <script>
    function testClick() {
      alert('Button works!');
      document.querySelector('.subtitle').textContent = 'Button clicked at ' + new Date().toLocaleTimeString();
    }
    console.log('[Smara] HTML loaded directly');
  </script>
</body>
</html>
